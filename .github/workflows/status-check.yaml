name: Status check
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

jobs:
  status-check:
    permissions:
      contents: read
      actions: read
      pull-requests: read
      checks: read
      statuses: read
