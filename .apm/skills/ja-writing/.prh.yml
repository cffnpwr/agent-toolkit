version: 1
rules:
  - expected: "（削除するか具体的な内容に書き換える）"
    pattern: /重要なのは、?/
  - expected: "（削除するか、必要性を明示した具体的な表現に書き換える）"
    pattern: /不可欠(な|である|だ)/
  - expected: "（具体的な観点を列挙する表現に書き換える）"
    pattern: /多角的(な|に|である|だ)/
  - expected: "（具体的に何をするかを明示する表現に書き換える）"
    pattern: /掘り下げ(る|て|た)/
  - expected: "（節の内容を要約する見出し・冒頭文に書き換える）"
    pattern: /本章では/
  - expected: "（削除するか具体的な内容に書き換える）"
    pattern: /ここでは、?.{0,20}について見ていく/
  - expected: "（言い換えを削除し、主張をそのまま書く）"
    pattern: /に他ならない/
  - expected: "（何が核心かを具体的に書く）"
    pattern: /核心的(な|である|だ)/
  - expected: "（何をどう書いたかを具体的に示す）"
    pattern: /深掘り(する|して|した)/
